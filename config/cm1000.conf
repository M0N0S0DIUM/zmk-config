#
# ZMK Features
#
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_BATTERY=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_IDLE_TIMEOUT=600000

#
# Bluetooth
#
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y
CONFIG_BT_SETTINGS=y

#
# USB
#
CONFIG_USB_DEVICE_STACK=y

#
# RGB Underglow (SK6803/WS2812 via SPI)
#
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=1
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

#
# Display / Nice!View
#
CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_SSD1306=n

#
# LVGL Configuration for nice!view
#
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_DPI_DEF=161
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_UNSCII_8=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_CANVAS=y
CONFIG_NICE_VIEW_WIDGET_STATUS=y

#
# Encoder (EC11)
#
CONFIG_SENSOR=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

#
# General
#
CONFIG_I2C=y
CONFIG_FLASH=y
CONFIG_SETTINGS=y
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_PM=y
CONFIG_PM_DEVICE=y

#
# Battery Fuel Gauge (MAX17048 via I2C1 - auto-enabled by DT node + I2C)
#
CONFIG_ZMK_MAX17048=y

